name: IndexNow Submission

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Wait for Vercel deployment
        run: sleep 90
      
      - name: Submit core pages to IndexNow
